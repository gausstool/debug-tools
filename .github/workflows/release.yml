# .github/workflows/release.yml
name: Create Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.1.3 等

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build artifacts
        run: |
          sh shells/zip-archive.sh
          # 你的构建命令，例如：
          # npm run build
          # go build -o myapp
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            out/*.zip
            # 要上传的文件，例如：
            # dist/*.zip
            # myapp
          generate_release_notes: true  # 自动生成 Release 说明