# .github/workflows/release.yml
name: Create Release

on:
  push:
    tags:
      - 'v*'  # 匹配 v1.0.0, v2.1.3 等

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 关键：授予写权限1
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.14.0'  # 指定 Node.js 版本
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Build artifacts
        run: |
          sh shells/zip-archive.sh # 运行构建脚本
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            *.zip # 发布的文件路径